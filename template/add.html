{% include "header.html" %}

    <style>
        body {
            background-color: #f4f4f4;
        }
        .hero {
            background: linear-gradient(to right, #007bffb8, #6710f2b9);
            color: white;
            padding: 50px 20px;
            text-align: center;
            border-radius: 10px;
        }
        .form-container {
            max-width: 500px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        }
        .form-control {
            margin-bottom: 15px;
        }
    </style>


    <div class="container">
        <div class="form-container">
            <h3 class="text-center text-primary">Add a New Book</h3>
            <form action="/store/" method="GET">
                <label for="title" class="form-label">Title:</label>
                <input type="text" class="form-control" name="title" required>

                <label for="author" class="form-label">Author:</label>
                <input type="text" class="form-control" name="author" required>

                <label for="isbn" class="form-label">ISBN:</label>
                <input type="text" class="form-control" name="isbn" required>

                <label for="category" class="form-label">Category:</label>
                <input type="text" class="form-control" name="category" required>

                <label for="published_Year" class="form-label">Published Year:</label>
                <input type="number" class="form-control" name="published_Year" required>

                <div class="form-check">
                    <input type="checkbox" class="form-check-input" name="availability" id="cb">
                    <label for="cb" class="form-check-label">Available</label>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">Add Book</button>
                <a href="/home/" class="btn btn-secondary w-100" style="margin-top: 10px;">Go to Home</a>
            </form>
        </div>
    </div>

</body>
</html>
